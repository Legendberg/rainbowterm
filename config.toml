regex = '''(?i)(Input errors|Output errors|Errors|Drops|Framing errors|Runts|Giants|Collisions|CRC errors|FIFO errors|MTU errors|Resource errors|Policed discards|Aged packets|L2 channel errors|L2 mismatch timeouts|L3 incompletes|HS link CRC errors|Carrier transitions):\s+(\d{1,3})(\d{3})(\d{3})(\d{3})(\d{3})\b'''
color = { "1" = "status-critical", "2" = "err-violet", "3" = "err-magenta", "4" = "err-crimson", "5" = "err-darkred", "6" = "err-red" }
priority = 177
exclusive = false

# Error counter - billions (10-12 digits): red label + error spectrum
[[profiles.juniper.patterns]]
description = "Error counter - billions (severe)"
regex = '''(?i)(Input errors|Output errors|Errors|Drops|Framing errors|Runts|Giants|Collisions|CRC errors|FIFO errors|MTU errors|Resource errors|Policed discards|Aged packets|L2 channel errors|L2 mismatch timeouts|L3 incompletes|HS link CRC errors|Carrier transitions):\s+(\d{1,3})(\d{3})(\d{3})(\d{3})\b'''
color = { "1" = "status-critical", "2" = "err-magenta", "3" = "err-crimson", "4" = "err-darkred", "5" = "err-red" }
priority = 176
exclusive = false

# Error counter - millions (7-9 digits): red label + magnitude spectrum
