# =============================================================================
# OPTICS DIAGNOSTICS (show interfaces diagnostics optics)
# =============================================================================

# Optical Power Levels (dBm) - Rx and Tx power thresholds
# Note: dBm is logarithmic, -10 dBm = 0.1 mW, -20 dBm = 0.01 mW
# Higher (less negative) is stronger signal

# Critical: Signal too weak (< -25 dBm) - likely link failure imminent
[[profiles.juniper.patterns]]
description = "Optical Power - Critical (< -25 dBm)"
regex = '''(-(?:2[5-9]|[3-9][0-9])\.?\d*)\s*dBm'''
color = "status-critical"
priority = 97
exclusive = false

# Warning: Signal weak (-20 to -24.99 dBm) - degraded but functional
[[profiles.juniper.patterns]]
description = "Optical Power - Warning (-20 to -25 dBm)"
regex = '''(-(?:2[0-4])\.?\d*)\s*dBm'''
color = "status-warning"
priority = 97
exclusive = false

