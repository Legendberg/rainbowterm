# =============================================================================
# ERROR COUNTERS - Semantic coloring with magnitude spectrum
# Label: gray when 0 (healthy), red when >0 (problem)
# Number: green when 0, error spectrum when >0
# =============================================================================

# All error types list for reference:
# Input errors, Output errors, Errors, Drops, Framing errors, Runts, Giants,
# Collisions, CRC errors, FIFO errors, MTU errors, Resource errors,
# Policed discards, Aged packets, L2 channel errors, L2 mismatch timeouts,
# L3 incompletes, HS link CRC errors, Carrier transitions

# Error counter: 0 (healthy) - gray label + green 0
[[profiles.juniper.patterns]]
description = "Error counter: 0 (healthy)"
regex = '''(?i)(Input errors|Output errors|Errors|Drops|Framing errors|Runts|Giants|Collisions|CRC errors|FIFO errors|MTU errors|Resource errors|Policed discards|Aged packets|L2 channel errors|L2 mismatch timeouts|L3 incompletes|HS link CRC errors|Carrier transitions):\s+(0)\b'''
color = { "1" = "gray-medium", "2" = "status-good" }
priority = 178
exclusive = false

# Error counter - trillions (13-15 digits): red label + error spectrum
[[profiles.juniper.patterns]]
