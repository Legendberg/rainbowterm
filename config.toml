color = { "1" = "uptime-weeks", "2" = "uptime-days", "3" = "uptime-hours" }
priority = 88
exclusive = false

# Last change time format
[[profiles.versa.patterns]]
description = "Last change with minutes/seconds"
regex = '''\b(\d+)w(\d+)d(\d+)h(\d+)m(\d+)s\b'''
color = { "1" = "uptime-weeks", "2" = "uptime-days", "3" = "uptime-hours", "4" = "uptime-minutes", "5" = "uptime-seconds" }
priority = 89
exclusive = false

# Session age/idle format: HH:MM:SS
[[profiles.versa.patterns]]
description = "Session age/idle time"
regex = '''(?:session-age|idle-for|idle-timeout)\s+(\d+(?::\d+:\d+)?)'''
color = { "1" = "cyan-aqua" }
priority = 85
exclusive = false

# =============================================================================
# DATE EXCLUSIONS - Prevent dates from being colored as numbers
# =============================================================================

# Release date in YYYYMMDD format (Versa FlexVNF output)
# Format: "Release date:    20250627"
[[profiles.versa.patterns]]
description = "Release date (YYYYMMDD format - not a number)"
regex = '''(Release date):\s+(\d{8})\b'''
color = { "1" = "gray-medium", "2" = "cyan-aqua" }
priority = 160
exclusive = true

# Release version line (Versa FlexVNF)
# Format: "Release     :    22.1.4 (GA)"
[[profiles.versa.patterns]]
description = "Release version"
regex = '''(Release)\s+:\s+([\d\.]+)\s*(\(GA\))?'''
color = { "1" = "gray-medium", "2" = "cyan-bright", "3" = "status-good" }
priority = 160
exclusive = true

# =============================================================================
# TRAFFIC STATISTICS - Magnitude Spectrum
# =============================================================================

# Packets per second (PPS) - removed due to lookahead requirement
# PPS values will be colored by the general magnitude patterns

# Bytes - use magnitude spectrum
# Trillions (12+ digits)
[[profiles.versa.patterns]]
description = "Bytes - trillions"
regex = '''\b(\d{1,3})(,?\d{3})(,?\d{3})(,?\d{3})(,?\d{3})\b'''
color = { "1" = "mag-orange", "2" = "mag-yellow", "3" = "mag-green", "4" = "mag-blue", "5" = "mag-purple" }
priority = 75
exclusive = false

# Billions (10-12 digits)
[[profiles.versa.patterns]]
description = "Bytes - billions"
regex = '''\b(\d{1,3})(,?\d{3})(,?\d{3})(,?\d{3})\b'''
color = { "1" = "mag-yellow", "2" = "mag-green", "3" = "mag-blue", "4" = "mag-purple" }
priority = 74
exclusive = false

# Millions (7-9 digits)
[[profiles.versa.patterns]]
description = "Bytes - millions"
regex = '''\b(\d{1,3})(,?\d{3})(,?\d{3})\b'''
color = { "1" = "mag-green", "2" = "mag-blue", "3" = "mag-purple" }
priority = 73
exclusive = false

# Thousands (4-6 digits)
[[profiles.versa.patterns]]
description = "Bytes - thousands"
regex = '''\b(\d{1,3})(,?\d{3})\b'''
color = { "1" = "mag-blue", "2" = "mag-purple" }
priority = 72
exclusive = false

# =============================================================================
# ERROR COUNTERS - Error Spectrum (warm colors)
# =============================================================================

# Zero errors (healthy - green)
[[profiles.versa.patterns]]
description = "Zero errors"
regex = '''(?:ERRORS\s+)(\b0\b)'''
color = { "1" = "status-good" }
priority = 80
exclusive = false

# =============================================================================
# BRANCH/SITE NAMES
# =============================================================================

# Versa branch naming: vrNNNN-NN
[[profiles.versa.patterns]]
description = "Versa branch/site name"
regex = '''\bvr\d{3,4}(?:sdwan)?-\d{2}\b'''
color = "blue-bright"
priority = 95
exclusive = false

# =============================================================================
# POLICY AND RULE NAMES
# =============================================================================

# Access policy names
[[profiles.versa.patterns]]
description = "Access policy name"
regex = '''access-policy\s+([\w\-_]+)'''
color = { "1" = "purple-bright" }
priority = 90
exclusive = false

# SD-WAN rule names
[[profiles.versa.patterns]]
description = "SD-WAN rule name"
regex = '''(?:sdwan-rule-name|steering_rule)\s+([\w\-_]+)'''
color = { "1" = "cyan-aqua" }
priority = 90
exclusive = false

# QoS policy
[[profiles.versa.patterns]]
description = "QoS policy rule"
regex = '''app-qos-policy-rule\s+"([^"]+)"'''
color = { "1" = "orange-coral" }
priority = 90
exclusive = false

# =============================================================================
# APPLICATION IDENTIFICATION
# =============================================================================

# Versa application with (predef) marker
[[profiles.versa.patterns]]
description = "Predefined application"
regex = '''([\w\-_]+)/\(predef\)'''
color = { "1" = "cyan-aqua" }
priority = 85
exclusive = false

# =============================================================================
# VLAN INFORMATION
# =============================================================================

# IEEE802.1 VLAN references
[[profiles.versa.patterns]]
description = "VLAN ID reference"
regex = '''(?:VLAN|vlan)[- ]?(\d+)'''
color = { "1" = "blue-bright" }
priority = 80
exclusive = false

# Port VLAN ID
[[profiles.versa.patterns]]
description = "Port VLAN ID"
regex = '''Port VLAN ID:\s*(\d+)'''
color = { "1" = "blue-bright" }
priority = 85
exclusive = false

# =============================================================================
# GENERIC YES/NO AND TRUE/FALSE
# =============================================================================

[[profiles.versa.patterns]]
description = "Generic Yes"
regex = '''\bYes\b'''
color = "status-good"
priority = 50
exclusive = false

[[profiles.versa.patterns]]
description = "Generic No"
regex = '''\bNo\b'''
color = "gray-medium"
priority = 50
exclusive = false

[[profiles.versa.patterns]]
description = "Generic true"
regex = '''\btrue\b'''
color = "status-good"
priority = 50
exclusive = false

[[profiles.versa.patterns]]
description = "Generic false"
regex = '''\bfalse\b'''
color = "gray-medium"
priority = 50
exclusive = false
