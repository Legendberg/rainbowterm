[[profiles.cisco.patterns]]
description = "BGP down states"
regex = '''\b(Idle|Active|Connect|OpenSent|OpenConfirm)\b'''
color = "status-critical"
priority = 90

# =============================================================================
# CISCO SPANNING TREE
# =============================================================================

[[profiles.cisco.patterns]]
description = "STP Forwarding state"
regex = '''\b(FWD|forwarding)\b'''
color = "status-good"
priority = 90

[[profiles.cisco.patterns]]
description = "STP Blocking/Discarding"
regex = '''\b(BLK|blocking|discarding)\b'''
color = "status-warning"
priority = 90

[[profiles.cisco.patterns]]
description = "STP Root/Designated"
regex = '''\b(Root|Desg|designated)\b'''
color = "cyan-bright"
priority = 85

# =============================================================================
# CISCO OSPF
# =============================================================================

[[profiles.cisco.patterns]]
description = "OSPF Full state"
regex = '''\b(FULL)\b'''
color = "status-good"
priority = 90

[[profiles.cisco.patterns]]
description = "OSPF down states"
regex = '''\b(DOWN|INIT|2WAY|EXSTART|EXCHANGE|LOADING)\b'''
color = "status-critical"
priority = 90

# =============================================================================
# CISCO VTP/VLAN
# =============================================================================

[[profiles.cisco.patterns]]
description = "VTP mode"
regex = '''\b(Server|Client|Transparent)\b'''
color = "cyan-aqua"
priority = 80

[[profiles.cisco.patterns]]
description = "VLAN active"
regex = '''\bactive\b'''
color = "status-good"
priority = 80

[[profiles.cisco.patterns]]
description = "Trunk encapsulation"
regex = '''\b(dot1q|isl|negotiate)\b'''
color = "blue-bright"
priority = 80
