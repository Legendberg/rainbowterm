# RainbowTerm Configuration
# Context-aware terminal colorizer
# Config version: 0.2.15 (2025-12-24)

# Default profile to use when none is specified
default_profile = "juniper"

# =============================================================================
# HOSTNAME PREFIXES - Customize for your organization
# =============================================================================
# These prefixes are used for auto-detection when piping device output through rt.
# Add your organization's naming conventions here.
#
# Example: If your Juniper devices are named "jnpr-core-01", "jnpr-edge-02", etc.,
# add "jnpr" to the juniper list.
#
# Detection matches: prefix followed by any combination of letters, numbers, hyphens, underscores
# Example: "jr" matches "jr01", "jr-core-01", "jr_edge_02", etc.

[hostname_prefixes]
juniper = ["jr", "js"]           # Juniper devices (add your prefixes: "mx", "ex", "qfx", "srx", etc.)
versa = ["vr"]                   # Versa SD-WAN devices
cisco = ["cs", "sw", "rtr"]      # Cisco devices (add your prefixes: "cat", "nx", "asr", etc.)

# =============================================================================
# COLOR PALETTE
# =============================================================================
[palette]
# Reds
red-bright = "#ff0000"
red-dark = "#cc0000"

# Greens
green-bright = "#00ff00"
green-lime = "#00ff7f"
green-emerald = "#50c878"
green-forest = "#228b22"

# Yellows/Oranges
yellow-bright = "#ffff00"
yellow-gold = "#ffd700"
orange-bright = "#ff8c00"
orange-coral = "#ff7f50"

# Cyans/Blues
cyan-bright = "#00ffff"
cyan-aqua = "#00ced1"
blue-bright = "#0080ff"

# Purples
purple-bright = "#d946ef"
magenta-bright = "#ff00ff"

# Grays
gray-light = "#b0b0b0"
gray-medium = "#808080"
gray-dark = "#5f5f5f"

# Whites
white = "#ffffff"
white-soft = "#f8f9f9"

# Semantic colors
status-critical = "#ff0000"
status-error = "#dc143c"
status-warning = "#ff6600"
status-caution = "#ffbf00"
status-ok = "#228b22"
status-good = "#50c878"
status-excellent = "#00ff00"

# Interface speed colors
iface-ultra = "#00ff00"      # 100G+
iface-high = "#00ff7f"       # 10G
iface-medium = "#00ced1"     # 2.5G
iface-standard = "#ff7f50"   # 1G
iface-low = "#ffbf00"        # <1G

# Magnitude spectrum colors (rainbow progression for large numbers - NEUTRAL)
mag-orange = "#ff8c00"       # Trillions+ (leftmost digits)
mag-yellow = "#ffff00"       # Billions
mag-green = "#00ff7f"        # Millions
mag-blue = "#00bfff"         # Thousands
mag-purple = "#d946ef"       # Hundreds (rightmost 3 digits, 1-999)
mag-pink = "#ff69b4"         # Units (rightmost 3 digits for very large numbers)

# Error/problem spectrum colors (warm colors, increasing severity - BAD)
err-yellow = "#ffd700"       # Tens/Hundreds (minor issue)
err-orange = "#ff8c00"       # Thousands (moderate problem)
err-red = "#ff4500"          # Ten thousands (serious problem)
err-darkred = "#dc143c"      # Hundred thousands (severe problem)
err-crimson = "#b22222"      # Millions (critical problem)
err-magenta = "#ff1493"      # Billions (extremely critical)
err-violet = "#8b008b"       # Trillions+ (catastrophic - darkest/hottest)

# Uptime/stability spectrum (bell curve: short = meh, medium = healthy, too long = concerning)
uptime-seconds = "#808080"   # Seconds only (just rebooted, dark gray)
uptime-minutes = "#9e9e9e"   # Minutes (just started, neutral gray)
uptime-hours = "#90ee90"     # Hours (getting there, light green)
uptime-days = "#50c878"      # Days (stable, good)
uptime-weeks = "#228b22"     # Weeks (healthy - peak)
uptime-months = "#b8d900"    # Months (getting long, greenish-yellow)
uptime-1yr = "#ff8c00"       # ~1 year (concerning - orange)
uptime-2yr = "#ff4500"       # 2+ years (needs maintenance - red)

# Time spectrum - for visual parsing of timestamps
# Hours: 24 distinct colors (one per hour)
time-00 = "#1e1b4b"          # Midnight - deep indigo
time-01 = "#312e81"          # 1am - indigo
time-02 = "#3730a3"          # 2am - violet-indigo
time-03 = "#4338ca"          # 3am - violet
time-04 = "#4f46e5"          # 4am - light violet
time-05 = "#6366f1"          # 5am - lavender
time-06 = "#0891b2"          # 6am - cyan (dawn)
time-07 = "#0d9488"          # 7am - teal
time-08 = "#059669"          # 8am - emerald
time-09 = "#16a34a"          # 9am - green
time-10 = "#65a30d"          # 10am - lime
time-11 = "#a3e635"          # 11am - bright lime
time-12 = "#facc15"          # Noon - yellow (peak)
time-13 = "#fbbf24"          # 1pm - amber
time-14 = "#f59e0b"          # 2pm - orange-amber
time-15 = "#f97316"          # 3pm - orange
time-16 = "#ea580c"          # 4pm - dark orange
time-17 = "#dc2626"          # 5pm - red
time-18 = "#be185d"          # 6pm - pink
time-19 = "#a21caf"          # 7pm - fuchsia
time-20 = "#7c3aed"          # 8pm - purple
time-21 = "#6d28d9"          # 9pm - deep purple
time-22 = "#5b21b6"          # 10pm - dark purple
time-23 = "#4c1d95"          # 11pm - very dark purple

# Minutes/Seconds: 6 intervals (0-9, 10-19, 20-29, 30-39, 40-49, 50-59)
time-0x = "#94a3b8"          # :0X - slate
time-1x = "#a78bfa"          # :1X - purple
time-2x = "#60a5fa"          # :2X - blue
time-3x = "#34d399"          # :3X - emerald
time-4x = "#fbbf24"          # :4X - amber
time-5x = "#f87171"          # :5X - red

# =============================================================================
# BASE PROFILE - Common patterns for all vendors
# =============================================================================
[profiles.base]
description = "Universal patterns: IPs, MACs, dates, generic status"

# IPv4 addresses (simplified without lookbehind)
[[profiles.base.patterns]]
description = "IPv4 addresses"
regex = '''\b(?:(?:25[0-5]|2[0-4]\d|[0-1]?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|[0-1]?\d?\d)(?:/\d+)?\b'''
color = "green-emerald"
priority = 50
exclusive = false
case_insensitive = false

# MAC addresses (simplified without lookbehind/lookahead)
# Priority 150 to override queue counter patterns (145) that could match first 2 hex digits
# NOT exclusive - need to match multiple MACs per line (e.g., "Current address: X, Hardware address: Y")
[[profiles.base.patterns]]
description = "MAC addresses (colon format)"
regex = '''\b(?:[\da-fA-F]{1,2}:){5}[\da-fA-F]{1,2}\b'''
color = "orange-coral"
priority = 150
exclusive = false

[[profiles.base.patterns]]
description = "MAC addresses (dot format)"
regex = '''\b(?:[\da-fA-F]{4}\.){2}[\da-fA-F]{4}\b'''
color = "orange-coral"
priority = 150
exclusive = false

# Dates - informational (cyan)
[[profiles.base.patterns]]
description = "ISO dates (YYYY-MM-DD)"
regex = '''\b(20\d{2}-(?:0[1-9]|1[0-2])-(?:0[1-9]|[12]\d|3[01]))\b'''
color = "cyan-aqua"
priority = 40
exclusive = false

# Month-based dates (Dec 11)
[[profiles.base.patterns]]
description = "Syslog dates (Mon DD)"
regex = '''\b((?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d{1,2})\s+(?:[01]\d|2[0-3]):[0-5]\d:[0-5]\d\b'''
color = "cyan-aqua"
priority = 40
exclusive = false

# =============================================================================
# TIME SPECTRUM - Visual parsing of HH:MM:SS timestamps
# Hours: 24 distinct colors (one per hour)
# Minutes/Seconds: 6 intervals (0X, 1X, 2X, 3X, 4X, 5X)
