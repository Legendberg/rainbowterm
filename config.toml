# RainbowTerm Configuration
# Context-aware terminal colorizer

# Default profile to use when none is specified
default_profile = "juniper"

# =============================================================================
# COLOR PALETTE
# =============================================================================
[palette]
# Reds
red-bright = "#ff0000"
red-dark = "#cc0000"

# Greens
green-bright = "#00ff00"
green-lime = "#00ff7f"
green-emerald = "#50c878"
green-forest = "#228b22"

# Yellows/Oranges
yellow-bright = "#ffff00"
yellow-gold = "#ffd700"
orange-bright = "#ff8c00"
orange-coral = "#ff7f50"

# Cyans/Blues
cyan-bright = "#00ffff"
cyan-aqua = "#00ced1"
blue-bright = "#0080ff"

# Purples
purple-bright = "#d946ef"
magenta-bright = "#ff00ff"

# Grays
gray-light = "#b0b0b0"
gray-medium = "#808080"
gray-dark = "#5f5f5f"

# Whites
white = "#ffffff"
white-soft = "#f8f9f9"

# Semantic colors
status-critical = "#ff0000"
status-error = "#dc143c"
status-warning = "#ff6600"
status-ok = "#228b22"
status-good = "#50c878"
status-excellent = "#00ff00"

# Interface speed colors
iface-ultra = "#00ff00"      # 100G+
iface-high = "#00ff7f"       # 10G
iface-medium = "#00ced1"     # 2.5G
iface-standard = "#ff7f50"   # 1G
iface-low = "#ffbf00"        # <1G

# Magnitude spectrum colors (rainbow progression for large numbers - NEUTRAL)
mag-orange = "#ff8c00"       # Trillions+ (leftmost digits)
mag-yellow = "#ffff00"       # Billions
mag-green = "#00ff7f"        # Millions
mag-blue = "#00bfff"         # Thousands
mag-purple = "#d946ef"       # Hundreds (rightmost 3 digits, 1-999)

# Error/problem spectrum colors (warm colors, increasing severity - BAD)
err-yellow = "#ffd700"       # Tens/Hundreds (minor issue)
err-orange = "#ff8c00"       # Thousands (moderate problem)
err-red = "#ff4500"          # Ten thousands (serious problem)
err-darkred = "#dc143c"      # Hundred thousands (severe problem)
err-crimson = "#b22222"      # Millions (critical problem)
err-magenta = "#ff1493"      # Billions (extremely critical)
err-violet = "#8b008b"       # Trillions+ (catastrophic - darkest/hottest)

# =============================================================================
# BASE PROFILE - Common patterns for all vendors
# =============================================================================
[profiles.base]
description = "Universal patterns: IPs, MACs, dates, generic status"

# IPv4 addresses (simplified without lookbehind)
[[profiles.base.patterns]]
description = "IPv4 addresses"
regex = '''\b(?:(?:25[0-5]|2[0-4]\d|[0-1]?\d?\d)\.){3}(?:25[0-5]|2[0-4]\d|[0-1]?\d?\d)(?:/\d+)?\b'''
color = "green-emerald"
priority = 50
exclusive = false
case_insensitive = false

# MAC addresses (simplified without lookbehind/lookahead)
[[profiles.base.patterns]]
description = "MAC addresses (colon format)"
regex = '''\b(?:[\da-fA-F]{1,2}:){5}[\da-fA-F]{1,2}\b'''
color = "orange-coral"
priority = 50
exclusive = false

[[profiles.base.patterns]]
description = "MAC addresses (dot format)"
regex = '''\b(?:[\da-fA-F]{4}\.){2}[\da-fA-F]{4}\b'''
color = "orange-coral"
priority = 50
exclusive = false

# Priority 1: Critical Operational Keywords
[[profiles.base.patterns]]
description = "Error keywords"
regex = '''(?i)\b(error|failed|failure|fail)\b'''
color = "status-critical"
priority = 200
exclusive = false

[[profiles.base.patterns]]
description = "Warning prefix"
regex = '''(?i)^(warning:)'''
color = "status-warning"
priority = 200
exclusive = false

[[profiles.base.patterns]]
description = "Warning keywords"
regex = '''(?i)\b(warning|threshold|exceeded)\b'''
color = "status-warning"
priority = 200
exclusive = false

[[profiles.base.patterns]]
description = "No alarms (good status)"
regex = '''(No alarms currently active)'''
color = "status-good"
priority = 210
exclusive = false

[[profiles.base.patterns]]
description = "Success messages"
regex = '''(?i)\b(load complete|commit complete|configuration check succeeds)\b'''
color = "status-good"
priority = 200
exclusive = false

[[profiles.base.patterns]]
description = "Configuration mode entry/exit"
regex = '''(Entering configuration mode|Exiting configuration mode)'''
color = "cyan-bright"
priority = 180
exclusive = false

[[profiles.base.patterns]]
description = "Diff additions (lines starting with +)"
regex = '''^(\+\s+.+)$'''
color = "status-good"
priority = 190
exclusive = false

[[profiles.base.patterns]]
description = "Diff deletions (lines starting with -)"
regex = '''^(-\s+.+)$'''
color = "status-critical"
priority = 190
exclusive = false

[[profiles.base.patterns]]
description = "Diff modifications (lines starting with !)"
regex = '''^(!\s+.+)$'''
color = "yellow-gold"
priority = 190
exclusive = false

[[profiles.base.patterns]]
description = "Alarm severity - Critical/Major"
regex = '''\b(Critical|Major)\b'''
color = "status-critical"
priority = 210
exclusive = false

[[profiles.base.patterns]]
description = "Alarm severity - Minor"
regex = '''\b(Minor)\b'''
color = "status-warning"
priority = 210
exclusive = false

# Priority 2: Link and Device States
[[profiles.base.patterns]]
description = "Physical link is Up"
regex = '''Physical link is (Up)\b'''
color = "status-excellent"
priority = 150
exclusive = false

[[profiles.base.patterns]]
description = "Physical link is Down"
regex = '''Physical link is (Down)\b'''
color = "status-critical"
priority = 150
exclusive = false

[[profiles.base.patterns]]
description = "Device flags - Running"
regex = '''\b(Running)\b'''
color = "status-good"
priority = 140
exclusive = false

[[profiles.base.patterns]]
description = "Device flags - Hardware-Down"
regex = '''\b(Hardware-Down)\b'''
color = "status-critical"
priority = 140
exclusive = false

[[profiles.base.patterns]]
description = "Enabled status"
regex = '''\b(Enabled)\b'''
color = "status-good"
priority = 130
exclusive = false

# Priority 3: Traffic indicators
[[profiles.base.patterns]]
description = "Non-zero traffic rate - bps and pps (active)"
regex = '''\b([1-9]\d*) (bps|pps)'''
color = "status-good"
priority = 100
exclusive = false

[[profiles.base.patterns]]
description = "Zero traffic rate - bps and pps (idle)"
regex = '''\b(0) (bps|pps)'''
color = "gray-medium"
priority = 100
exclusive = false

[[profiles.base.patterns]]
description = "Non-zero packet counters (active)"
regex = '''(?:Input packets|Output packets)\s*:\s*([1-9]\d*)'''
color = "status-good"
priority = 95
exclusive = false

[[profiles.base.patterns]]
description = "Zero packet counters (idle)"
regex = '''(?:Input packets|Output packets)\s*:\s*(0)\b'''
color = "gray-medium"
priority = 95
exclusive = false

# Priority 4: Serial numbers and hardware IDs
[[profiles.base.patterns]]
description = "Serial numbers (alphanumeric)"
regex = '''\b([A-Z]{2}\d{10})\b'''
color = "yellow-gold"
priority = 90
exclusive = false

[[profiles.base.patterns]]
description = "Model numbers"
regex = '''\b(EX\d{4}-[A-Z0-9\-]+|MX\d{3,4}|QFX\d{4}|SRX\d{3,4})\b'''
color = "cyan-aqua"
priority = 90
exclusive = false

# Priority 5: Configuration keywords
[[profiles.base.patterns]]
description = "Set commands in configuration"
regex = '''^\s*(set)\s'''
color = "purple-bright"
priority = 80
exclusive = false

[[profiles.base.patterns]]
description = "Description labels"
regex = '''^\s+Description:\s+(.+)$'''
color = "cyan-aqua"
priority = 70
exclusive = false

# Generic Up status
[[profiles.base.patterns]]
description = "Generic 'up' status words"
regex = '''\b(up|Up|UP|online|Online|ONLINE)\b'''
color = "status-excellent"
priority = 10
exclusive = false
case_insensitive = false

# Generic Down status
[[profiles.base.patterns]]
description = "Generic 'down' status words"
regex = '''\b(down|Down|DOWN|offline|Offline|OFFLINE)\b'''
color = "status-critical"
priority = 10
exclusive = false
case_insensitive = false

# =============================================================================
# JUNIPER PROFILE
# =============================================================================
[profiles.juniper]
description = "Juniper JunOS devices (MX, EX, QFX, SRX series)"
inherits = ["base"]

# Auto-detection patterns (optional, used with --auto-detect)
[[profiles.juniper.auto_detect]]
type = "hostname"
pattern = "^(jr|js)"

[[profiles.juniper.auto_detect]]
type = "prompt"
pattern = '''\w+@[\w\-]+[>#]'''

# =============================================================================
# CLI PROMPTS - Visual mode indicators
# =============================================================================

# Juniper Operational Mode: user@hostname>
[[profiles.juniper.patterns]]
description = "CLI Prompt - Operational mode (>)"
regex = '''(\w+)@([\w\-\.]+)(>)'''
color = { "1" = "white", "2" = "blue-bright", "3" = "blue-bright" }
priority = 250
exclusive = true

# Juniper Configuration Mode: user@hostname#
[[profiles.juniper.patterns]]
description = "CLI Prompt - Configuration/Edit mode (#)"
regex = '''(\w+)@([\w\-\.]+)(#)'''
color = { "1" = "white", "2" = "red-bright", "3" = "red-bright" }
priority = 250
exclusive = true

# Virtual Chassis indicator {master:0}
[[profiles.juniper.patterns]]
description = "Virtual chassis role indicator"
regex = '''\{(master|backup|linecard):(\d+)\}'''
color = { "1" = "cyan-bright", "2" = "cyan-aqua" }
priority = 245
exclusive = false

# Juniper Edit Mode with path: [edit ...] context
[[profiles.juniper.patterns]]
description = "Configuration edit path context"
regex = '''\[edit(?:[\w\-\s\.\/]*)\]'''
color = "red-bright"
priority = 240
exclusive = false

# Interface patterns by speed
[[profiles.juniper.patterns]]
description = "Ultra-high-speed interfaces (100G+)"
regex = '''(?i)\b(?:et|fte)-\d+(?:/\d+){0,2}(?:\.\d+)?\b'''
color = "iface-ultra"
priority = 100
exclusive = true

[[profiles.juniper.patterns]]
description = "High-speed interfaces (10G)"
regex = '''(?i)\b(?:xe)-\d+(?:/\d+){0,2}(?:\.\d+)?\b'''
color = "iface-high"
priority = 100
exclusive = true

[[profiles.juniper.patterns]]
description = "Medium-speed interfaces (2.5G)"
regex = '''(?i)\b(?:mge)-\d+(?:/\d+){0,2}(?:\.\d+)?\b'''
color = "iface-medium"
priority = 100
exclusive = true

[[profiles.juniper.patterns]]
description = "Standard interfaces (1G)"
regex = '''(?i)\b(?:ge)-\d+(?:/\d+){0,2}(?:\.\d+)?\b'''
color = "iface-standard"
priority = 100
exclusive = true

[[profiles.juniper.patterns]]
description = "Low-speed interfaces (<1G)"
regex = '''(?i)\b(?:fe)-\d+(?:/\d+){0,2}(?:\.\d+)?\b'''
color = "iface-low"
priority = 100
exclusive = true

[[profiles.juniper.patterns]]
description = "Virtual Chassis Port interfaces"
regex = '''(?i)\b(?:vcp)-\d+(?:/\d+){0,2}(?:\.\d+)?\b'''
color = "cyan-aqua"
priority = 100
exclusive = true

[[profiles.juniper.patterns]]
description = "Logical/virtual interfaces"
regex = '''(?i)\b(?:lo|irb|vlan|pfe|pfh|fxp|me|em|ae|reth|bme|jsrv)(?:-?\d+(?:/\d+)*)?(?:\.\d+)?\b'''
color = "purple-bright"
priority = 100
exclusive = true

[[profiles.juniper.patterns]]
description = "Special service interfaces"
regex = '''(?i)\b(?:cbp|dsc|esi|fti|gre|ipip|lsi|mtun|pimd|pime|pip|tap|vme|vtep)(?:\d+)?(?:\.\d+)?\b'''
color = "cyan-aqua"
priority = 100
exclusive = true

# =============================================================================
# MAGNITUDE SPECTRUM - Context-Aware Rainbow Coloring
# =============================================================================
# 
# CORE PHILOSOPHY: "Same number, different meaning, different color"
# 
# RainbowTerm's key differentiator is context-aware coloring. The same number
# should be colored differently (or not at all) depending on its semantic meaning:
#
#   Example: The number "1644910"
#     ✓ "Output packets: 1644910"        → Spectrum colors (traffic counter)
#     ✓ Queue counter table column       → Spectrum colors (statistical data)
#     ✗ "Last flapped: 2025-12-09"       → No color (date component)
#     ✗ "interface ge-0/0/10"            → No color (identifier)
#
#   Example: The number "0"
#     ✓ "Dropped packets: 0"             → Gray (idle/good state)
#     ✓ Queue counter table showing 0    → Gray (no traffic)
#     ✗ "Queue ID: 0"                    → No color (identifier)
#
# MAGNITUDE SPECTRUM PROGRESSION (for counters/statistics only):
#   - Hundreds (1-999):        Purple only
#   - Thousands (1K-999K):     Blue → Purple  
#   - Millions (1M-999M):      Green → Blue → Purple
#   - Billions (1B-999B):      Yellow → Green → Blue → Purple
#   - Trillions (1T+):         Orange → Yellow → Green → Blue → Purple
#
# IMPLEMENTATION STRATEGIES:
#   1. Label-based: Match numbers preceded by specific labels
#      Example: "(?:Input\s+bytes|Output\s+packets)\s*:\s+(\d+)"
#   2. Structural: Match numbers in specific table positions
#      Example: "\s{10,}(\d+)" for counter columns (10+ spaces = data, not ID)
#   3. Negative: Explicitly avoid dates, IDs, config values
#
# This context-awareness is why RainbowTerm exists - to provide semantic meaning
# through color, not just syntax highlighting.
# =============================================================================

# Zero values (special case - grayed out)
[[profiles.juniper.patterns]]
description = "Zero packet/byte/rate counters"
regex = '''(?:Input\s+packets|Output\s+packets|Input\s+bytes|Output\s+bytes|Input\s+rate|Output\s+rate)\s*:\s+(0)\b'''
color = "gray-medium"
priority = 160
exclusive = false

# =============================================================================
# FILE SIZE MAGNITUDE SPECTRUM (for ls -l, show log, etc.)
# =============================================================================

# File sizes in ls -l output (number followed by month abbreviation)
# Matches format: "123456 Nov" or "123456 Sep"

# Billions range (1GB+)
[[profiles.juniper.patterns]]
description = "File size - Billions (1GB+)"
regex = '''\s+(\d{1,3})(\d{3})(\d{3})(\d{3})\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)'''
color = { "1" = "mag-yellow", "2" = "mag-green", "3" = "mag-blue", "4" = "mag-purple" }
priority = 159
exclusive = true

# Millions range (1MB+)
[[profiles.juniper.patterns]]
description = "File size - Millions (1MB+)"
regex = '''\s+(\d{1,3})(\d{3})(\d{3})\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)'''
color = { "1" = "mag-green", "2" = "mag-blue", "3" = "mag-purple" }
priority = 158
exclusive = true

# Thousands range (1KB+)
[[profiles.juniper.patterns]]
description = "File size - Thousands (1KB+)"
regex = '''\s+(\d{1,3})(\d{3})\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)'''
color = { "1" = "mag-blue", "2" = "mag-purple" }
priority = 157
exclusive = true

# Hundreds range (1-999 bytes)
[[profiles.juniper.patterns]]
description = "File size - Hundreds (bytes)"
regex = '''\s+(\d{1,3})\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)'''
color = "mag-purple"
priority = 156
exclusive = true

# Zero size files
[[profiles.juniper.patterns]]
description = "File size - Zero"
regex = '''\s+(0)\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)'''
color = "gray-medium"
priority = 161
exclusive = true

# Trillions (13-15 digits): orange → yellow → green → blue → purple
[[profiles.juniper.patterns]]
description = "Trillions range (13-15 digits)"
regex = '''(?:Input\s+packets|Output\s+packets|Input\s+bytes|Output\s+bytes|Input\s+rate|Output\s+rate)\s*:\s+(\d{1,3})(\d{3})(\d{3})(\d{3})(\d{3})\b'''
color = { "1" = "mag-orange", "2" = "mag-yellow", "3" = "mag-green", "4" = "mag-blue", "5" = "mag-purple" }
priority = 155
exclusive = true

# Billions (10-12 digits): yellow → green → blue → purple
[[profiles.juniper.patterns]]
description = "Billions range (10-12 digits)"
regex = '''(?:Input\s+packets|Output\s+packets|Input\s+bytes|Output\s+bytes|Input\s+rate|Output\s+rate)\s*:\s+(\d{1,3})(\d{3})(\d{3})(\d{3})\b'''
color = { "1" = "mag-yellow", "2" = "mag-green", "3" = "mag-blue", "4" = "mag-purple" }
priority = 154
exclusive = true

# Millions (7-9 digits): green → blue → purple
[[profiles.juniper.patterns]]
description = "Millions range (7-9 digits)"
regex = '''(?:Input\s+packets|Output\s+packets|Input\s+bytes|Output\s+bytes|Input\s+rate|Output\s+rate)\s*:\s+(\d{1,3})(\d{3})(\d{3})\b'''
color = { "1" = "mag-green", "2" = "mag-blue", "3" = "mag-purple" }
priority = 153
exclusive = true

# Thousands (4-6 digits): blue → purple
[[profiles.juniper.patterns]]
description = "Thousands range (4-6 digits)"
regex = '''(?:Input\s+packets|Output\s+packets|Input\s+bytes|Output\s+bytes|Input\s+rate|Output\s+rate)\s*:\s+(\d{1,3})(\d{3})\b'''
color = { "1" = "mag-blue", "2" = "mag-purple" }
priority = 152
exclusive = true

# Hundreds (1-3 digits): purple only
[[profiles.juniper.patterns]]
description = "Hundreds range (1-3 digits)"
regex = '''(?:Input\s+packets|Output\s+packets|Input\s+bytes|Output\s+bytes|Input\s+rate|Output\s+rate)\s*:\s+(\d{1,3})\b'''
color = "mag-purple"
priority = 151
exclusive = true

# =============================================================================
# QUEUE COUNTER MAGNITUDE SPECTRUM (under "packets" header)
# Matches numbers on lines with 3+ space-separated numbers (counter table rows)
# Format: "    0                          1644910              1644910                    0"
# Note: Patterns match numbers preceded by 10+ spaces (data columns, not queue ID)
# =============================================================================

# =============================================================================
# DROPPED PACKETS COLUMN - Error spectrum (3rd column in queue counter table)
# Match the rightmost number group after two previous number groups
# =============================================================================

# Dropped packets - Zero (green, healthy - no drops!)
[[profiles.juniper.patterns]]
description = "Dropped packets - Zero (healthy)"
regex = '''^\s+\d+\s+\d+\s+\d+\s+(0)\s*$'''
color = "status-good"
priority = 155
exclusive = false

# Dropped packets - Millions: crimson → dark red → yellow
[[profiles.juniper.patterns]]
description = "Dropped packets - Millions"
regex = '''^\s+\d+\s+\d+\s+\d+\s+(\d{1,3})(\d{3})(\d{3})\s*$'''
color = { "1" = "err-crimson", "2" = "err-darkred", "3" = "err-yellow" }
priority = 154
exclusive = false

# Dropped packets - Hundred thousands: dark red → yellow
[[profiles.juniper.patterns]]
description = "Dropped packets - Hundred thousands"
regex = '''^\s+\d+\s+\d+\s+\d+\s+(\d{3})(\d{3})\s*$'''
color = { "1" = "err-darkred", "2" = "err-yellow" }
priority = 153
exclusive = false

# Dropped packets - Ten thousands: red → yellow
[[profiles.juniper.patterns]]
description = "Dropped packets - Ten thousands"
regex = '''^\s+\d+\s+\d+\s+\d+\s+(\d{2})(\d{3})\s*$'''
color = { "1" = "err-red", "2" = "err-yellow" }
priority = 152
exclusive = false

# Dropped packets - Thousands: orange → yellow
[[profiles.juniper.patterns]]
description = "Dropped packets - Thousands"
regex = '''^\s+\d+\s+\d+\s+\d+\s+(\d{1,3})(\d{3})\s*$'''
color = { "1" = "err-orange", "2" = "err-yellow" }
priority = 151
exclusive = false

# Dropped packets - Hundreds: yellow
[[profiles.juniper.patterns]]
description = "Dropped packets - Hundreds"
regex = '''^\s+\d+\s+\d+\s+\d+\s+(\d{1,3})\s*$'''
color = "err-yellow"
priority = 150
exclusive = false

# Queue counter - Zero (gray for idle) - after 10+ spaces
[[profiles.juniper.patterns]]
description = "Queue counter - Zero"
regex = '''\s{10,}(0)\b'''
color = "gray-medium"
priority = 149
exclusive = false

# Queue counter - Billions (10-12 digits): yellow → green → blue → purple
[[profiles.juniper.patterns]]
description = "Queue counter - Billions (10-12 digits)"
regex = '''\s{10,}(\d{1,3})(\d{3})(\d{3})(\d{3})\b'''
color = { "1" = "mag-yellow", "2" = "mag-green", "3" = "mag-blue", "4" = "mag-purple" }
priority = 148
exclusive = false

# Queue counter - Millions (7-9 digits): green → blue → purple
[[profiles.juniper.patterns]]
description = "Queue counter - Millions (7-9 digits)"
regex = '''\s{10,}(\d{1,3})(\d{3})(\d{3})\b'''
color = { "1" = "mag-green", "2" = "mag-blue", "3" = "mag-purple" }
priority = 147
exclusive = false

# Queue counter - Thousands (4-6 digits): blue → purple
[[profiles.juniper.patterns]]
description = "Queue counter - Thousands (4-6 digits)"
regex = '''\s{10,}(\d{1,3})(\d{3})\b'''
color = { "1" = "mag-blue", "2" = "mag-purple" }
priority = 146
exclusive = false

# Queue counter - Hundreds (1-3 digits): purple only
[[profiles.juniper.patterns]]
description = "Queue counter - Hundreds (1-3 digits)"
regex = '''\s{10,}([1-9]\d{0,2})\b'''
color = "mag-purple"
priority = 145
exclusive = false

# =============================================================================
# ERROR/PROBLEM SPECTRUM - Warm colors for bad counters (errors, drops, etc.)
# =============================================================================
# These patterns match error/drop/problem counters with magnitude-based severity coloring.
# Each group of 3 digits gets progressively warmer colors (yellow → orange → red → magenta)
# as you move left (increasing magnitude), indicating escalating problem severity.
#
# Pattern mirrors neutral spectrum but with warm colors:
#   - Hundreds (1-999):               Yellow (rightmost, minor issue)
#   - Thousands (1K-999K):            Orange → Yellow (moderate)
#   - Ten thousands (10K-99K):        Red → Orange → Yellow (serious)
#   - Hundred thousands (100K-999K):  Dark Red → Red → Orange → Yellow (severe)
#   - Millions+ (1M+):                Magenta → Dark Red → Red → Orange → Yellow (critical)
#
# Zero values remain gray (good state, no problems).
#
# Covered error types:
#   - Input/Output Errors, Drops, Framing errors, CRC errors
#   - Runts, Giants, Collisions, Resource errors, FIFO errors
#   - MTU errors, Policed discards, Aged packets
# =============================================================================

# Error counter - Zero (green, healthy state - no errors is GOOD!)
[[profiles.juniper.patterns]]
description = "Error counter - Zero (no problems)"
regex = '''(?i)(?:Errors|Drops|Framing errors|Runts|Giants|Collisions|CRC errors|FIFO errors|MTU errors|Resource errors|Policed discards|Aged packets|L2 channel errors|L2 mismatch timeouts|L3 incompletes|HS link CRC errors|Carrier transitions)\s*:\s+(0)\b'''
color = "status-good"
priority = 168
exclusive = false

# Error counter - Trillions (13-15 digits): Beyond catastrophic (if you see this, something is very wrong)
[[profiles.juniper.patterns]]
description = "Error counter - Trillions (catastrophic)"
regex = '''(?i)(?:Errors|Drops|Framing errors|Runts|Giants|Collisions|CRC errors|FIFO errors|MTU errors|Resource errors|Policed discards|Aged packets|L2 channel errors|L2 mismatch timeouts|L3 incompletes|HS link CRC errors|Carrier transitions)\s*:\s+(\d{1,3})(\d{3})(\d{3})(\d{3})(\d{3})\b'''
color = { "1" = "err-violet", "2" = "err-magenta", "3" = "err-darkred", "4" = "err-crimson", "5" = "err-yellow" }
priority = 166
exclusive = false

