description = "BGP Established state (healthy)"
regex = '''\b(Established|Establ)\b'''
color = "status-excellent"
priority = 90
exclusive = true

# Idle = Peer is down/not trying - PROBLEM (usually)
[[profiles.juniper.patterns]]
description = "BGP Idle state (down)"
regex = '''\b(Idle)\b'''
color = "status-critical"
priority = 90
exclusive = true

# Active/Connect = Peer is trying to connect - WARNING (not up yet)
# Note: "Active alarms/defects" patterns at priority 155-156 run first and
# block this from coloring "Active" in those contexts via exclusive matching
[[profiles.juniper.patterns]]
description = "BGP Active state (trying to connect)"
regex = '''\b(Active)\b'''
