# =============================================================================
# CONTEXT-AWARE RULES - Juniper Interface Blocks
# =============================================================================
[[profiles.juniper.contexts]]
name = "interface_block"
description = "Track interface state for context-aware coloring"
start = '''(?i)^Physical interface:\s+([a-z0-9\-/\.]+)'''

# State variables to track
[[profiles.juniper.contexts.track]]
name = "physical_link"
pattern = '''(?i)Physical link is\s+(Up|Down)'''
capture_group = 1

[[profiles.juniper.contexts.track]]
name = "admin_status"
pattern = '''(?i)Device flags\s*:\s*.*?\s+(Up|Down)\b'''
capture_group = 1

# Context-aware rules
[[profiles.juniper.contexts.rules]]
pattern = '''(?i)Half-Duplex'''
state_key = "physical_link"
priority = 200

[[profiles.juniper.contexts.rules.colors]]
value = "Up"
color = "status-critical"

[[profiles.juniper.contexts.rules.colors]]
value = "Down"
color = "gray-medium"

default_color = "gray-medium"

[[profiles.juniper.contexts.rules]]
pattern = '''(?i)Full-Duplex'''
priority = 200

# No state_key means always apply the first color
[[profiles.juniper.contexts.rules.colors]]
value = "always"
color = "status-good"

default_color = "status-good"

# =============================================================================
# ERROR COUNTERS - Context-aware (UP interface = RED, DOWN interface = YELLOW)
# Non-zero errors on UP interface are active problems
# Non-zero errors on DOWN interface are historical (less urgent)
# =============================================================================

# Input errors with non-zero count
[[profiles.juniper.contexts.rules]]
pattern = '''(?i)Input errors:\s*([1-9]\d*)'''
state_key = "physical_link"
priority = 195

[[profiles.juniper.contexts.rules.colors]]
value = "Up"
color = "status-critical"

[[profiles.juniper.contexts.rules.colors]]
value = "Down"
color = "status-warning"

default_color = "status-warning"

# Output errors with non-zero count
[[profiles.juniper.contexts.rules]]
pattern = '''(?i)Output errors:\s*([1-9]\d*)'''
state_key = "physical_link"
priority = 195

[[profiles.juniper.contexts.rules.colors]]
value = "Up"
color = "status-critical"

[[profiles.juniper.contexts.rules.colors]]
value = "Down"
color = "status-warning"

default_color = "status-warning"

# CRC errors with non-zero count
[[profiles.juniper.contexts.rules]]
pattern = '''(?i)CRC(?:\s+errors)?:\s*([1-9]\d*)'''
state_key = "physical_link"
priority = 195

[[profiles.juniper.contexts.rules.colors]]
value = "Up"
color = "status-critical"

[[profiles.juniper.contexts.rules.colors]]
value = "Down"
color = "status-warning"

default_color = "status-warning"

# Framing errors with non-zero count
[[profiles.juniper.contexts.rules]]
pattern = '''(?i)Framing errors:\s*([1-9]\d*)'''
state_key = "physical_link"
priority = 195

[[profiles.juniper.contexts.rules.colors]]
value = "Up"
color = "status-critical"

[[profiles.juniper.contexts.rules.colors]]
value = "Down"
color = "status-warning"

default_color = "status-warning"

# Drops with non-zero count
[[profiles.juniper.contexts.rules]]
pattern = '''(?i)(?:Input|Output)?\s*Drops:\s*([1-9]\d*)'''
state_key = "physical_link"
priority = 195

[[profiles.juniper.contexts.rules.colors]]
value = "Up"
color = "status-critical"

[[profiles.juniper.contexts.rules.colors]]
value = "Down"
color = "status-warning"

default_color = "status-warning"

# =============================================================================
# ZERO TRAFFIC - Context-aware (UP interface = suspicious, DOWN = expected)
# Zero traffic on UP interface might indicate misconfiguration
# Zero traffic on DOWN interface is expected
# =============================================================================

# Zero input bytes on interface
[[profiles.juniper.contexts.rules]]
pattern = '''(?i)Input\s+bytes\s*:\s*(0)\s'''
state_key = "physical_link"
priority = 190

[[profiles.juniper.contexts.rules.colors]]
value = "Up"
color = "status-warning"

[[profiles.juniper.contexts.rules.colors]]
value = "Down"
color = "gray-medium"

default_color = "gray-medium"

# Zero output bytes on interface
[[profiles.juniper.contexts.rules]]
pattern = '''(?i)Output\s+bytes\s*:\s*(0)\s'''
state_key = "physical_link"
priority = 190

[[profiles.juniper.contexts.rules.colors]]
value = "Up"
color = "status-warning"

[[profiles.juniper.contexts.rules.colors]]
value = "Down"
color = "gray-medium"

default_color = "gray-medium"

# Zero input packets
[[profiles.juniper.contexts.rules]]
pattern = '''(?i)Input\s+packets\s*:\s*(0)\s'''
state_key = "physical_link"
priority = 190

[[profiles.juniper.contexts.rules.colors]]
value = "Up"
color = "status-warning"

[[profiles.juniper.contexts.rules.colors]]
value = "Down"
color = "gray-medium"

default_color = "gray-medium"

# Zero output packets
[[profiles.juniper.contexts.rules]]
pattern = '''(?i)Output\s+packets\s*:\s*(0)\s'''
state_key = "physical_link"
priority = 190

[[profiles.juniper.contexts.rules.colors]]
value = "Up"
color = "status-warning"

[[profiles.juniper.contexts.rules.colors]]
value = "Down"
color = "gray-medium"

default_color = "gray-medium"

# =============================================================================
# UPTIME/STABILITY - Bell curve spectrum
# Short = neutral, Medium = healthy (green), Too long = concerning (needs maintenance)
# JunOS formats: (3w6d 02:06 ago), (00:23:15 ago), 2:15:23
# =============================================================================

# 2+ years (104+ weeks) - RED - definitely needs maintenance/security patches
[[profiles.juniper.patterns]]
description = "Uptime - 2+ years (needs maintenance)"
regex = '''\((\d{3,}w\d+d\s+\d{2}:\d{2})\s+ago\)'''
color = "uptime-2yr"
priority = 180
exclusive = true

# ~1 year (52-103 weeks) - ORANGE - concerning
[[profiles.juniper.patterns]]
description = "Uptime - ~1 year (concerning)"
regex = '''\(([5-9]\dw\d+d\s+\d{2}:\d{2})\s+ago\)'''
color = "uptime-1yr"
priority = 179
exclusive = true

# Months (5-51 weeks) - GREENISH-YELLOW - getting long
[[profiles.juniper.patterns]]
description = "Uptime - months (5-51 weeks)"
regex = '''\(((?:[5-9]|[1-4]\d)w\d+d\s+\d{2}:\d{2})\s+ago\)'''
color = "uptime-months"
priority = 178
exclusive = true

# Weeks (1-4 weeks) - DEEP GREEN - healthy (peak)
[[profiles.juniper.patterns]]
description = "Uptime - weeks (healthy)"
regex = '''\(([1-4]w\d+d\s+\d{2}:\d{2})\s+ago\)'''
color = "uptime-weeks"
priority = 177
exclusive = true

# Days (no weeks, just Xd) - GREEN - stable
[[profiles.juniper.patterns]]
description = "Uptime - days (stable)"
regex = '''\((\d+d\s+\d{2}:\d{2})\s+ago\)'''
color = "uptime-days"
priority = 176
exclusive = true

# Hours (01-23:XX:XX ago) - LIGHT GREEN - getting there
[[profiles.juniper.patterns]]
description = "Uptime - hours (1-23h)"
regex = '''\(((?:0[1-9]|1\d|2[0-3]):\d{2}:\d{2})\s+ago\)'''
color = "uptime-hours"
priority = 175
exclusive = true

# Minutes only (00:01-59:XX ago) - GRAY - just started
[[profiles.juniper.patterns]]
description = "Uptime - minutes only"
regex = '''\((00:(?:0[1-9]|[1-5]\d):\d{2})\s+ago\)'''
color = "uptime-minutes"
priority = 175
exclusive = true

# Seconds only (00:00:XX ago) - DARK GRAY - just rebooted
[[profiles.juniper.patterns]]
description = "Uptime - seconds only"
regex = '''\((00:00:\d{2})\s+ago\)'''
color = "uptime-seconds"
priority = 175
exclusive = true

# BGP Last Up/Dwn - hours:minutes:seconds format (various uptimes)
# Format like "2:15:23" means 2 hours, 15 minutes, 23 seconds
[[profiles.juniper.patterns]]
description = "BGP uptime - hours"
regex = '''\s+(\d{1,2}:\d{2}:\d{2})\s+(?:Establ|Active|Connect|OpenSent|OpenConfirm|Idle)'''
color = "uptime-hours"
priority = 174
exclusive = false

# "never" in BGP uptime = problem
[[profiles.juniper.patterns]]
description = "BGP uptime - never (problem)"
regex = '''\s+(never)\s+(?:Establ|Active|Connect|OpenSent|OpenConfirm|Idle)'''
color = "status-critical"
priority = 174
exclusive = false

