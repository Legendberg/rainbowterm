# =============================================================================
# VERSA PROFILE - Versa SD-WAN devices (FlexVNF, Director, Analytics)
# =============================================================================
[profiles.versa]
description = "Versa SD-WAN devices (FlexVNF, VOS)"
inherits = ["base"]

# Auto-detection patterns for profile selection
# Note: Hostname prefixes are configured in [hostname_prefixes] section at top of file
[[profiles.versa.auto_detect]]
type = "prompt"
pattern = '''\w+@[\w\-]+-cli>'''

[[profiles.versa.auto_detect]]
type = "content"
pattern = '''(?i)\b(vni|tvi|dtvi|ptvi)-?\d+'''

[[profiles.versa.auto_detect]]
type = "content"
pattern = '''(?i)\b[\w\-]+-(Control|LAN|Transport)-VR\b'''

[[profiles.versa.auto_detect]]
type = "content"
pattern = '''(?i)Versa FlexVNF'''

[[profiles.versa.auto_detect]]
type = "content"
pattern = '''(?i)\bVERSA\b'''

# =============================================================================
# CLI PROMPTS AND OUTPUT MARKERS
# =============================================================================

# Versa CLI Prompt: admin@hostname-cli>
[[profiles.versa.patterns]]
description = "CLI Prompt - Versa operational mode"
regex = '''(\w+)@([\w\-\.]+)(-cli)(>)'''
color = { "1" = "white", "2" = "blue-bright", "3" = "cyan-aqua", "4" = "blue-bright" }
priority = 250
exclusive = true

# Versa Configuration Mode: admin@hostname-cli(config)%
[[profiles.versa.patterns]]
description = "CLI Prompt - Versa configuration mode"
regex = '''(\w+)@([\w\-]+)(-cli)(\(config\))(%)'''
color = { "1" = "white", "2" = "red-bright", "3" = "cyan-aqua", "4" = "red-bright", "5" = "red-bright" }
priority = 251
exclusive = true

# Versa [edit] context marker (like Juniper)
[[profiles.versa.patterns]]
description = "Configuration edit context"
regex = '''\[edit\]'''
color = "red-bright"
priority = 240
exclusive = false

# Versa configuration mode entry message
[[profiles.versa.patterns]]
description = "Entering configuration mode"
regex = '''(Entering configuration mode) (private|exclusive|shared)'''
color = { "1" = "cyan-bright", "2" = "red-bright" }
priority = 180
exclusive = false

# Versa output status marker: [ok][timestamp]
[[profiles.versa.patterns]]
description = "Output status marker - OK"
regex = '''\[(ok)\]\[(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2})\]'''
color = { "1" = "status-good", "2" = "cyan-aqua" }
priority = 245
exclusive = false

# Aborted by user
[[profiles.versa.patterns]]
description = "Command aborted"
regex = '''\bAborted:\s*by user\b'''
color = "status-warning"
priority = 245
exclusive = false

