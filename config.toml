# =============================================================================
# ERROR/PROBLEM SPECTRUM - Warm colors for bad counters (errors, drops, etc.)
# =============================================================================
# These patterns match error/drop/problem counters with magnitude-based severity coloring.
# Each group of 3 digits gets progressively warmer colors (yellow → orange → red → magenta)
# as you move left (increasing magnitude), indicating escalating problem severity.
#
# Pattern mirrors neutral spectrum but with warm colors:
#   - Hundreds (1-999):               Yellow (rightmost, minor issue)
#   - Thousands (1K-999K):            Orange → Yellow (moderate)
#   - Ten thousands (10K-99K):        Red → Orange → Yellow (serious)
#   - Hundred thousands (100K-999K):  Dark Red → Red → Orange → Yellow (severe)
#   - Millions+ (1M+):                Magenta → Dark Red → Red → Orange → Yellow (critical)
#
# Zero values remain gray (good state, no problems).
#
# Covered error types:
#   - Input/Output Errors, Drops, Framing errors, CRC errors
#   - Runts, Giants, Collisions, Resource errors, FIFO errors
#   - MTU errors, Policed discards, Aged packets
# =============================================================================

# Error counter - Zero (green, healthy state - no errors is GOOD!)
[[profiles.juniper.patterns]]
description = "Error counter - Zero (no problems)"
regex = '''(?i)(?:Errors|Drops|Framing errors|Runts|Giants|Collisions|CRC errors|FIFO errors|MTU errors|Resource errors|Policed discards|Aged packets|L2 channel errors|L2 mismatch timeouts|L3 incompletes|HS link CRC errors|Carrier transitions)\s*:\s+(0)\b'''
color = "status-good"
priority = 168
exclusive = false

# Error counter - Trillions (13-15 digits): Beyond catastrophic (if you see this, something is very wrong)
[[profiles.juniper.patterns]]
description = "Error counter - Trillions (catastrophic)"
regex = '''(?i)(?:Errors|Drops|Framing errors|Runts|Giants|Collisions|CRC errors|FIFO errors|MTU errors|Resource errors|Policed discards|Aged packets|L2 channel errors|L2 mismatch timeouts|L3 incompletes|HS link CRC errors|Carrier transitions)\s*:\s+(\d{1,3})(\d{3})(\d{3})(\d{3})(\d{3})\b'''
color = { "1" = "err-violet", "2" = "err-magenta", "3" = "err-darkred", "4" = "err-crimson", "5" = "err-yellow" }
priority = 166
exclusive = false

# Error counter - Billions (10-12 digits): Extremely critical
[[profiles.juniper.patterns]]
description = "Error counter - Billions (extremely critical)"
regex = '''(?i)(?:Errors|Drops|Framing errors|Runts|Giants|Collisions|CRC errors|FIFO errors|MTU errors|Resource errors|Policed discards|Aged packets|L2 channel errors|L2 mismatch timeouts|L3 incompletes|HS link CRC errors|Carrier transitions)\s*:\s+(\d{1,3})(\d{3})(\d{3})(\d{3})\b'''
color = { "1" = "err-magenta", "2" = "err-darkred", "3" = "err-crimson", "4" = "err-yellow" }
priority = 165
exclusive = false

# Error counter - Millions (7-9 digits): crimson → dark red → yellow (rightmost always yellow)
[[profiles.juniper.patterns]]
description = "Error counter - Millions (critical)"
regex = '''(?i)(?:Errors|Drops|Framing errors|Runts|Giants|Collisions|CRC errors|FIFO errors|MTU errors|Resource errors|Policed discards|Aged packets|L2 channel errors|L2 mismatch timeouts|L3 incompletes|HS link CRC errors|Carrier transitions)\s*:\s+(\d{1,3})(\d{3})(\d{3})\b'''
color = { "1" = "err-crimson", "2" = "err-darkred", "3" = "err-yellow" }
priority = 164
exclusive = false

# Error counter - Hundred thousands (6 digits): dark red → yellow (rightmost always yellow)
[[profiles.juniper.patterns]]
description = "Error counter - Hundred thousands (severe)"
regex = '''(?i)(?:Errors|Drops|Framing errors|Runts|Giants|Collisions|CRC errors|FIFO errors|MTU errors|Resource errors|Policed discards|Aged packets|L2 channel errors|L2 mismatch timeouts|L3 incompletes|HS link CRC errors|Carrier transitions)\s*:\s+(\d{3})(\d{3})\b'''
color = { "1" = "err-darkred", "2" = "err-yellow" }
priority = 163
exclusive = false

# Error counter - Ten thousands (5 digits): red → yellow (rightmost always yellow)
[[profiles.juniper.patterns]]
